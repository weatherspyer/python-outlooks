name: Run SPC Radius Batch Test

on:
  workflow_dispatch:
    inputs:
      data:
        description: "Full JSON payload (context + locations)"
        required: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials.json
        run: echo "${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}" | base64 --decode > credentials.json

      # ✅ ADD WEBHOOK SECRETS AS ENV VARS (THIS WAS MISSING)
      - name: Run SPC Radius Batch Test
        env:
          GOOGLE_SHEETS_WEBHOOK_API_URL_ID: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_API_URL_ID }}
          GOOGLE_SHEETS_WEBHOOK_API_KEY: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_API_KEY }}
        run: |
          python -u spc_radius_test.py '${{ github.event.inputs.data }}'
