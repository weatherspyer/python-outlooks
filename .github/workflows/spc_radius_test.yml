name: Run SPC Radius Batch Test

on:
  workflow_dispatch:
    inputs:
      locations:
        description: "Batch locations JSON (from Apps Script)"
        required: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials.json
        run: echo "${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}" | base64 --decode > credentials.json

      - name: Run SPC Radius Batch Test
        env:
          INPUT_LOCATIONS: ${{ github.event.inputs.locations }}
        run: |
          python -u spc_radius_test.py
